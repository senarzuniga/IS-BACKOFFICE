# config_simulation_clock.yaml
# Propósito: Parámetros para reloj de simulación

entity:
  name: "SimulationClock"
  category: "time"

parameters:
  - name: "tick_s"
    description: "Resolución temporal en segundos"
    unit: "s"
    default: 1.0
    min: 0.1
    max: 3600.0
    recommended: 1.0
    mandatory: true
    optional: false
    validation_rule: ">0"

validation:
  cross_parameter_rules: []

kpi_impacted:
  - "temporal_resolution"

risk: "Tick mal configurado"
priority: "High"
