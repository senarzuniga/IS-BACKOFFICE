# config_forklift.yaml
# Propósito: Parámetros de configuración para carretillas (Forklift)

entity:
  name: "Forklift"
  category: "vehicle"

parameters:
  - name: "max_speed_m_s"
    description: "Velocidad máxima"
    unit: "m/s"
    default: 1.2
    min: 0.1
    max: 3.0
    recommended: 1.2
    mandatory: true
    optional: false
    validation_rule: ">0"
  - name: "capacity_kg"
    description: "Capacidad de carga en kg"
    unit: "kg"
    default: 2000.0
    min: 100.0
    max: 10000.0
    recommended: 2000.0
    mandatory: true
    optional: false
    validation_rule: ">0"

validation:
  cross_parameter_rules: []

kpi_impacted:
  - "forklift_utilization"

risk: "Capacidad insuficiente"
priority: "High"
