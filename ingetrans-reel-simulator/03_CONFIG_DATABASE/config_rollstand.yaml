# config_rollstand.yaml
# Propósito: Parámetros de configuración para RollStand

entity:
  name: "RollStand"
  category: "machine"

parameters:
  - name: "tracks_attached"
    description: "Número de tracks conectados al roll stand"
    unit: "uds"
    default: 2
    min: 1
    max: 10
    recommended: 2
    mandatory: true
    optional: false
    validation_rule: ">=1"

validation:
  cross_parameter_rules: []

kpi_impacted:
  - "stand_availability"

risk: "stand mal configurado"
priority: "High"
