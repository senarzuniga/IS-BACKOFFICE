# config_reel.yaml
# Propósito: Parámetros de configuración para la entidad Reel

entity:
  name: "Reel"
  category: "material"

parameters:
  - name: "default_gramaje_g_m2"
    description: "Gramaje por defecto"
    unit: "g/m2"
    default: 120.0
    min: 10.0
    max: 1000.0
    recommended: 120.0
    mandatory: true
    optional: false
    validation_rule: ">0"
  - name: "default_width_mm"
    description: "Ancho por defecto"
    unit: "mm"
    default: 1500.0
    min: 100.0
    max: 3000.0
    recommended: 1500.0
    mandatory: true
    optional: false
    validation_rule: ">0"

validation:
  cross_parameter_rules: []

kpi_impacted:
  - "material_consumption_accuracy"

risk: "Datos de bobina incorrectos"
priority: "High"
