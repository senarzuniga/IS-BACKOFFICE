# config_transfer.yaml
# Propósito: Parámetros de configuración para unidades de transferencia (manual o automáticas)

entity:
  name: "Transfer"
  category: "transport"

parameters:
  - name: "max_speed_m_s"
    description: "Velocidad máxima de la unidad de transferencia"
    unit: "m/s"
    default: 1.0
    min: 0.1
    max: 5.0
    recommended: 1.0
    mandatory: true
    optional: false
    validation_rule: ">0"
  - name: "cycle_time_s"
    description: "Tiempo de ciclo estimado"
    unit: "s"
    default: 45.0
    min: 2.0
    max: 3600.0
    recommended: 45.0
    mandatory: false
    optional: true
    validation_rule: ">0"

validation:
  cross_parameter_rules: []

kpi_impacted:
  - "transfer_cycle_time"

risk: "Mal dimensionamiento del ciclo"
priority: "High"
