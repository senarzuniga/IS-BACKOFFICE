# config_ingetrans.yaml
# Propósito: Parámetros de configuración para el sistema INGETRANS (Automatic Transfer)

entity:
  name: "INGETRANS"
  category: "automation"

parameters:
  - name: "cycle_time_s"
    description: "Tiempo de ciclo medio en segundos"
    unit: "s"
    default: 30.0
    min: 2.0
    max: 600.0
    recommended: 30.0
    mandatory: true
    optional: false
    validation_rule: ">0"
  - name: "max_speed_m_s"
    description: "Velocidad máxima del transfer"
    unit: "m/s"
    default: 2.0
    min: 0.1
    max: 5.0
    recommended: 2.0
    mandatory: true
    optional: false
    validation_rule: ">0"

validation:
  cross_parameter_rules: []

kpi_impacted:
  - "ingetrans_cycle_time"

risk: "Fallo de automatización"
priority: "High"
