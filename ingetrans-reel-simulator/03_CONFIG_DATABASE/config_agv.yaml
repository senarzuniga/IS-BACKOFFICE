# config_agv.yaml
# Propósito: Parámetros para AGV (preparado para expansión)

entity:
  name: "AGV"
  category: "vehicle"

parameters:
  - name: "enabled"
    description: "Si los AGVs están habilitados en la simulación"
    unit: "bool"
    default: false
    min: false
    max: true
    recommended: false
    mandatory: false
    optional: true
    validation_rule: ""
  - name: "max_speed_m_s"
    description: "Velocidad máxima típica"
    unit: "m/s"
    default: 1.5
    min: 0.1
    max: 5.0
    recommended: 1.5
    mandatory: false
    optional: true
    validation_rule: ">0"

validation:
  cross_parameter_rules: []

kpi_impacted:
  - "agv_utilization"

risk: "AGVs no operativos"
priority: "Low"
