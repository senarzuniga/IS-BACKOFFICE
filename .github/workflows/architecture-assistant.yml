name: Architecture Assistant Scan

on:
  pull_request:
    paths:
      - '**'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run Architecture Assistant scanner
        run: |
          python tools/architecture_assistant/check_architecture.py --root . --report Architecture/AI/architecture_report.json

      - name: Upload architecture report
        uses: actions/upload-artifact@v4
        with:
          name: architecture-report
          path: Architecture/AI/architecture_report.json

      - name: Show summary
        run: |
          python -c "import json; r=json.load(open('Architecture/AI/architecture_report.json')); print('Scanned files:', r['scanned_files']); print('Summary:', r['summary'])"

  tests:
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dev requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest -q
