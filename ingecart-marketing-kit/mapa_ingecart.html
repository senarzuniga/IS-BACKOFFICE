<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingecart - Presencia Global | Mapa Real</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1A1D24;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 2rem;
        }

        .container {
            background: #1A1D24;
            border-radius: 28px;
            padding: 1.5rem;
            box-shadow: 0 30px 45px rgba(0,0,0,0.5);
        }

        .map-container {
            position: relative;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: white;
        }

        .download-btn {
            display: block;
            width: fit-content;
            margin: 1.8rem auto 0.5rem auto;
            background: #FFC845;
            color: #1A1D24;
            border: none;
            padding: 12px 32px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .download-btn:hover {
            background: #e2b03a;
            transform: scale(1.02);
        }

        .caption {
            text-align: center;
            color: #adb7c9;
            font-size: 0.7rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="map-container">
        <canvas id="worldCanvas" width="1200" height="700" style="width:100%; height:auto; max-width:1200px; aspect-ratio:1200/700"></canvas>
    </div>
    <button class="download-btn" id="downloadPNG">⬇️ Descargar imagen PNG</button>
    <div class="caption">📍 Puntos rojos: instalaciones activas de Ingecart en la industria del corrugado</div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('worldCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 1200;
        canvas.height = 700;

        // === USAR TU IMAGEN LOCAL ===
        // IMPORTANTE: Coloca el archivo "mapamundi.png" en la MISMA carpeta que este HTML
        const MAP_IMAGE_URL = 'mapamundi.png';
        
        let mapImage = new Image();
        
        // --------------------------------------------------------------
        // DIBUJAR PUNTOS ROJOS (coordenadas ajustadas)
        // --------------------------------------------------------------
        
        function drawRedDot(x, y, size = 6) {
            ctx.save();
            ctx.shadowBlur = 4;
            ctx.shadowColor = "rgba(0,0,0,0.3)";
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fillStyle = '#D32F2F';
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(x, y, size * 0.4, 0, Math.PI * 2);
            ctx.fillStyle = '#FFAAAA';
            ctx.fill();
            ctx.restore();
        }

        function drawMultipleDots(baseX, baseY, count, radius = 20, baseSize = 5.5) {
            for (let i = 0; i < count; i++) {
                let angle = Math.random() * Math.PI * 2;
                let distance = Math.random() * radius;
                let offsetX = Math.cos(angle) * distance;
                let offsetY = Math.sin(angle) * distance;
                let variation = baseSize + (Math.random() * 1.2 - 0.6);
                drawRedDot(baseX + offsetX, baseY + offsetY, variation);
            }
        }

        function drawAllMarkers() {
            // ----- USA -----
            drawMultipleDots(490, 270, 3, 12, 5.5);   // Atlanta
            drawRedDot(380, 290, 6);                   // Ciudad Juárez
            
            // ----- LATAM: 30 puntos -----
            drawMultipleDots(410, 330, 7, 20, 5.2);    // México
            drawMultipleDots(530, 380, 7, 18, 5.3);    // Colombia
            drawMultipleDots(540, 420, 5, 15, 5.0);    // Ecuador
            drawMultipleDots(545, 460, 6, 18, 5.2);    // Perú
            drawMultipleDots(565, 520, 5, 18, 5.4);    // Chile
            
            // ----- EUROPA: 40 puntos -----
            drawMultipleDots(800, 260, 10, 22, 5.3);   // Alemania
            drawMultipleDots(735, 270, 8, 20, 5.2);    // Francia
            drawMultipleDots(790, 310, 7, 18, 5.3);    // Italia
            drawMultipleDots(840, 275, 4, 14, 5.0);    // República Checa
            drawMultipleDots(870, 260, 6, 18, 5.2);    // Polonia
            drawMultipleDots(765, 258, 5, 14, 5.0);    // Bélgica
            
            // ----- ESPAÑA: 50 puntos -----
            drawMultipleDots(705, 288, 20, 18, 5.5);    // Catalunya
            drawMultipleDots(685, 295, 17, 25, 5.3);    // Interior
            drawRedDot(705, 325, 5.5);                  // Almería 1
            drawRedDot(710, 323, 5.5);                  // Almería 2
            drawRedDot(708, 328, 5.2);                  // Almería 3
            drawMultipleDots(720, 305, 7, 15, 5.3);     // Comunidad Valenciana
            drawMultipleDots(715, 320, 3, 10, 5.2);     // Murcia
        }

        function drawFooter() {
            ctx.save();
            ctx.font = 'bold 19px "Segoe UI", Arial, sans-serif';
            ctx.fillStyle = '#1A1D24';
            ctx.shadowBlur = 0;
            ctx.textAlign = 'center';
            
            const startY = 650;
            const centerX = canvas.width / 2;
            
            // Fondo semitransparente para legibilidad
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            ctx.fillRect(30, startY - 22, canvas.width - 60, 55);
            
            ctx.fillStyle = '#1A1D24';
            let kpiText = "1.268 Proyectos   •   28 Años   •   26 Acuerdos int.   •   194 Instalaciones";
            ctx.fillText(kpiText, centerX, startY + 5);
            
            ctx.font = '10px "Segoe UI", Arial, sans-serif';
            ctx.fillStyle = '#6B7A8F';
            ctx.fillText("Ingecart - Presencia global en plantas de cartón corrugado", centerX, startY + 32);
            ctx.textAlign = 'left';
            ctx.restore();
        }

        function renderMapWithMarkers() {
            ctx.drawImage(mapImage, 0, 0, canvas.width, canvas.height);
            drawAllMarkers();
            drawFooter();
        }

        mapImage.onload = function() {
            renderMapWithMarkers();
        };
        
        mapImage.onerror = function() {
            ctx.fillStyle = '#F2F6FC';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#C0C8D8';
            ctx.font = '18px Arial';
            ctx.textAlign = 'center';
            ctx.fillText("❌ No se pudo cargar 'mapamundi.png'", canvas.width/2, canvas.height/2 - 20);
            ctx.font = '14px Arial';
            ctx.fillText("Asegúrate de que el archivo está en la MISMA carpeta que este HTML", canvas.width/2, canvas.height/2 + 20);
            ctx.fillText("Nombre esperado: mapamundi.png", canvas.width/2, canvas.height/2 + 50);
        };
        
        // Cargar tu imagen local
        mapImage.src = MAP_IMAGE_URL;
        
        document.getElementById('downloadPNG').addEventListener('click', function() {
            setTimeout(() => {
                try {
                    const link = document.createElement('a');
                    link.download = 'ingecart_presencia_mundial.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } catch(e) {
                    alert("Puedes hacer clic derecho sobre el mapa y seleccionar 'Guardar imagen como'");
                }
            }, 500);
        });
    })();
</script>
</body>
</html>
